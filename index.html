<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=360, height=640, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:360px;
height:640px;
overflow:hidden;
background:#d4d0c8;
font-family:Tahoma, Arial, sans-serif;
color:#000;
}

/* MAIN CONTAINER */

.app-container{
width:360px;
height:640px;
display:flex;
flex-direction:column;
background:#d4d0c8;
}

/* WINCE TITLE BAR */

.status-bar{
width:100%;
height:28px;
background:#0a246a;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8px;
font-size:13px;
font-weight:bold;
}

/* CONTENT */

.main-content{
flex:1;
padding:6px;
display:flex;
flex-direction:column;
}

/* INDUSTRIAL SCAN BUTTON */

.scan-btn{
width:100%;
height:40px;
background:#e4e4e4;
border:2px solid #808080;
border-top-color:#ffffff;
border-left-color:#ffffff;
border-right-color:#404040;
border-bottom-color:#404040;
font-size:16px;
font-weight:bold;
color:#000;
cursor:pointer;
margin-bottom:6px;
}

.scan-btn:active{
border-top-color:#404040;
border-left-color:#404040;
border-right-color:#ffffff;
border-bottom-color:#ffffff;
}

/* SECTION LABEL */

.section-label{
font-size:12px;
font-weight:bold;
margin:4px 0;
}

/* GRID */

.grid{
width:100%;
background:#ffffff;
border:1px solid #808080;
padding:4px;
margin-bottom:6px;
}

.row{
display:flex;
}

.cell{
width:16px;
height:22px;
border:1px solid #b0b0b0;
background:white;
text-align:center;
font-family:Courier New, monospace;
font-size:13px;
line-height:22px;
}

.orange{
background:#ffff99;
}

.gray{
background:#e0e0e0;
}

/* STATUS HEADER */

.select-status-header{
width:100%;
height:28px;
background:#c0c0c0;
border:1px solid #808080;
display:flex;
align-items:center;
padding-left:6px;
font-size:12px;
font-weight:bold;
margin-bottom:4px;
}

/* SELECT */

.status-select{
width:100%;
height:32px;
border:1px solid #808080;
background:white;
font-size:13px;
margin-bottom:6px;
}

/* GPS */

.gps-status{
font-size:12px;
background:#f0f0f0;
border:1px solid #808080;
padding:4px;
margin-bottom:6px;
display:flex;
align-items:center;
gap:6px;
}

.gps-dot{
width:8px;
height:8px;
background:#ff0000;
}

.gps-dot.active{
background:#00aa00;
}

/* STATUS MESSAGE */

.status-message{
border:1px solid #808080;
background:#f0f0f0;
padding:6px;
text-align:center;
font-size:12px;
margin-bottom:6px;
}

.success{
color:#006600;
}

.error{
color:#aa0000;
}

/* KEYPAD */

.keypad-wrapper{
background:#d4d0c8;
border:1px solid #808080;
padding:4px;
}

.keypad-num{
display:flex;
justify-content:center;
}

.col{
display:flex;
flex-direction:column;
}

.center-col{
display:flex;
flex-direction:column;
margin:0 4px;
}

.center-row{
display:flex;
justify-content:center;
}

/* BUTTONS */

.btn,.grid-btn{
width:56px;
height:34px;
margin:2px;
background:#e4e4e4;
border:2px solid #808080;
border-top-color:#ffffff;
border-left-color:#ffffff;
border-right-color:#404040;
border-bottom-color:#404040;
font-size:14px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.btn:active,.grid-btn:active{
border-top-color:#404040;
border-left-color:#404040;
border-right-color:#ffffff;
border-bottom-color:#ffffff;
}

/* QWERTY */

.keypad-qwerty{
display:none;
flex-direction:column;
align-items:center;
}

.q-row{
display:flex;
}

.q-btn{
width:28px;
height:34px;
margin:1px;
background:#e4e4e4;
border:1px solid #808080;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
cursor:pointer;
}

.q-btn.wide{
width:44px;
}

.q-btn.space{
width:90px;
}

/* SCANNER */

.scanner-modal{
display:none;
position:fixed;
top:0;
left:0;
width:360px;
height:640px;
background:black;
flex-direction:column;
}

.scanner-modal.active{
display:flex;
}

.scanner-header{
height:30px;
background:#0a246a;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 6px;
}

.scanner-close{
cursor:pointer;
}

#scanner-video{
width:100%;
height:100%;
object-fit:cover;
}

.scanner-footer{
height:50px;
display:flex;
justify-content:center;
align-items:center;
background:#d4d0c8;
}

.scanner-cancel{
background:#e4e4e4;
border:1px solid #808080;
padding:8px 20px;
font-weight:bold;
cursor:pointer;
}

.footer-time{
font-size:11px;
text-align:right;
margin-top:4px;
}
</style>
</head>

<script>
  // TIME UPDATE
  function updateTime() {
    var el = document.getElementById("timeDisplay");
    var now = new Date();
    var hours = now.getHours();
    var ampm = hours >= 12 ? "PM" : "AM";
    hours = hours % 12 || 12;
    var minutes = now.getMinutes() < 10 ? "0" + now.getMinutes() : now.getMinutes();
    el.textContent = hours + ":" + minutes + " " + ampm;
    
    document.getElementById("footerTime").textContent = now.toLocaleDateString();
  }
  setInterval(updateTime, 1000);
  updateTime();

  // ========== FIXED: ROBUST REVERSE GEOCODING WITH MULTIPLE FALLBACKS ==========
  var gpsDot = document.getElementById("gpsDot");
  var gpsText = document.getElementById("gpsText");
  
  // Location object - always holds latest real data
  var locationData = {
    coords: { lat: null, lon: null, accuracy: null },
    address: { city: "", state: "", zip: "", full: "Acquiring GPS..." },
    timestamp: null
  };

  var watchId = null;
  var lastKnownCoords = null;

  // PRIMARY: BigDataCloud API (free, no API key needed for limited use)
  // FALLBACK 1: Nominatim with proper headers
  // FALLBACK 2: Coordinates only
  function fetchAddressFromCoords(lat, lon, callback) {
    var addressResolved = false;
    var fallbackTimer = setTimeout(function() {
      if (!addressResolved) {
        console.log("Geocoding timeout, using coordinates");
        callback({ 
          city: "", 
          state: "", 
          zip: "", 
          full: lat.toFixed(4) + ", " + lon.toFixed(4) + " (location only)" 
        });
      }
    }, 8000);

    // Try BigDataCloud first (better for old browsers, no CORS issues usually)
    var bdcUrl = "https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=" + lat + "&longitude=" + lon + "&localityLanguage=en";
    
    var xhr = new XMLHttpRequest();
    xhr.open("GET", bdcUrl, true);
    xhr.timeout = 5000;
    
    xhr.onload = function() {
      if (xhr.status === 200 && !addressResolved) {
        try {
          var data = JSON.parse(xhr.responseText);
          if (data) {
            addressResolved = true;
            clearTimeout(fallbackTimer);
            
            var city = data.city || data.locality || data.town || "";
            var state = data.principalSubdivision || data.administrativeArea || "";
            var zip = data.postcode || "";
            
            var parts = [];
            if (city) parts.push(city);
            if (state) parts.push(state);
            if (zip) parts.push(zip);
            var full = parts.join(", ") || lat.toFixed(4) + ", " + lon.toFixed(4);
            
            callback({ city: city, state: state, zip: zip, full: full });
            return;
          }
        } catch (e) {
          console.log("BigDataCloud parse error, trying Nominatim");
        }
      }
      
      // If BigDataCloud fails, try Nominatim
      if (!addressResolved) {
        tryNominatim(lat, lon, callback, fallbackTimer, function() { addressResolved = true; });
      }
    };
    
    xhr.onerror = function() {
      console.log("BigDataCloud network error, trying Nominatim");
      if (!addressResolved) {
        tryNominatim(lat, lon, callback, fallbackTimer, function() { addressResolved = true; });
      }
    };
    
    xhr.ontimeout = function() {
      console.log("BigDataCloud timeout, trying Nominatim");
      if (!addressResolved) {
        tryNominatim(lat, lon, callback, fallbackTimer, function() { addressResolved = true; });
      }
    };
    
    xhr.send();
  }
  
  // Nominatim fallback with proper headers for old browsers
  function tryNominatim(lat, lon, callback, fallbackTimer, markResolved) {
    var nominatimUrl = "https://nominatim.openstreetmap.org/reverse?format=json&lat=" + lat + "&lon=" + lon + "&zoom=18&addressdetails=1";
    
    var xhr2 = new XMLHttpRequest();
    xhr2.open("GET", nominatimUrl, true);
    xhr2.timeout = 5000;
    
    // Set a proper User-Agent (required by Nominatim)
    xhr2.setRequestHeader("User-Agent", "ScanTrack-App/1.0");
    xhr2.setRequestHeader("Accept", "application/json");
    
    xhr2.onload = function() {
      if (xhr2.status === 200) {
        try {
          var data = JSON.parse(xhr2.responseText);
          if (data && data.address) {
            markResolved();
            clearTimeout(fallbackTimer);
            
            var addr = data.address;
            var city = addr.city || addr.town || addr.village || addr.hamlet || addr.county || "";
            var state = addr.state || addr.region || "";
            var zip = addr.postcode || "";
            
            var parts = [];
            if (city) parts.push(city);
            if (state) parts.push(state);
            if (zip) parts.push(zip);
            var full = parts.join(", ") || lat.toFixed(4) + ", " + lon.toFixed(4);
            
            callback({ city: city, state: state, zip: zip, full: full });
            return;
          }
        } catch (e) {
          console.log("Nominatim parse error");
        }
      }
      
      // If both fail, just use coordinates
      if (!markResolved) {
        // Will be handled by fallback timer
      }
    };
    
    xhr2.onerror = function() {
      console.log("Nominatim network error");
      // Fallback timer will handle
    };
    
    xhr2.send();
  }

  // Update GPS display with current locationData
  function updateGpsDisplay() {
    var text = "";
    var dotClass = "gps-dot";
    
    if (locationData.coords.lat !== null && locationData.coords.lon !== null) {
      dotClass = "gps-dot active";
      
      // Always show coordinates + address if available
      var coordStr = locationData.coords.lat.toFixed(4) + ", " + locationData.coords.lon.toFixed(4);
      
      if (locationData.address.full && locationData.address.full.indexOf("Acquiring") === -1) {
        text = locationData.address.full;
        // Add accuracy if available
        if (locationData.coords.accuracy) {
          text += " (±" + Math.round(locationData.coords.accuracy) + "m)";
        }
      } else {
        // Fallback to coordinates if address not yet resolved
        text = coordStr;
        if (locationData.coords.accuracy) {
          text += " (±" + Math.round(locationData.coords.accuracy) + "m)";
        }
        if (locationData.address.full && locationData.address.full.indexOf("location only") > -1) {
          text = coordStr + " (address unavailable)";
        }
      }
    } else {
      dotClass = "gps-dot error";
      text = "GPS unavailable - check permissions";
    }
    
    gpsDot.className = dotClass;
    gpsText.textContent = text;
  }

  // Handle geolocation success
  function onLocationSuccess(position) {
    var lat = position.coords.latitude;
    var lon = position.coords.longitude;
    var accuracy = position.coords.accuracy;
    
    // Update coordinates
    locationData.coords = { lat: lat, lon: lon, accuracy: accuracy };
    locationData.timestamp = position.timestamp;
    
    // Check if coordinates changed significantly (more than 100m) to trigger new reverse geocode
    var shouldFetchAddress = true;
    if (lastKnownCoords) {
      var R = 6371e3;
      var φ1 = lastKnownCoords.lat * Math.PI/180;
      var φ2 = lat * Math.PI/180;
      var Δφ = (lat - lastKnownCoords.lat) * Math.PI/180;
      var Δλ = (lon - lastKnownCoords.lon) * Math.PI/180;
      var a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
              Math.cos(φ1) * Math.cos(φ2) *
              Math.sin(Δλ/2) * Math.sin(Δλ/2);
      var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      var distance = R * c;
      if (distance < 100) shouldFetchAddress = false;
    }
    
    lastKnownCoords = { lat: lat, lon: lon };
    
    // Update display immediately with coordinates
    updateGpsDisplay();
    
    // Fetch new address if needed
    if (shouldFetchAddress) {
      fetchAddressFromCoords(lat, lon, function(addr) {
        locationData.address = addr;
        updateGpsDisplay();
      });
    } else {
      updateGpsDisplay();
    }
  }

  // Handle geolocation error
  function onLocationError(error) {
    var msg = "";
    switch(error.code) {
      case error.PERMISSION_DENIED: msg = "Permission denied - enable location"; break;
      case error.POSITION_UNAVAILABLE: msg = "Position unavailable - weak signal"; break;
      case error.TIMEOUT: msg = "GPS timeout - try again"; break;
      default: msg = "GPS error";
    }
    locationData.coords = { lat: null, lon: null, accuracy: null };
    gpsDot.className = "gps-dot error";
    gpsText.textContent = "GPS: " + msg;
  }

  // Start real-time location tracking
  function startRealTimeLocation() {
    if (navigator.geolocation) {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
      }
      
      var options = {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      };
      
      watchId = navigator.geolocation.watchPosition(onLocationSuccess, onLocationError, options);
      
      // Also try to get a quick fix with getCurrentPosition as backup
      navigator.geolocation.getCurrentPosition(onLocationSuccess, onLocationError, options);
    } else {
      gpsDot.className = "gps-dot error";
      gpsText.textContent = "Geolocation not supported";
    }
  }

  // Start tracking when page loads
  startRealTimeLocation();

  // Restart tracking when page becomes visible
  document.addEventListener("visibilitychange", function() {
    if (!document.hidden) {
      startRealTimeLocation();
    }
  });

  // GRID LOGIC
  var cells = Array.from(document.querySelectorAll(".input-cell"));
  var activeIndex = 0;
  var statusMsg = document.getElementById("statusMessage");
  var statusSelect = document.getElementById("statusSelect");

  function setActive(i) { 
    cells.forEach(c => c.classList.remove("orange")); 
    cells[i].classList.add("orange"); 
    activeIndex = i; 
  }
  
  function writeChar(ch) { 
    cells[activeIndex].textContent = ch; 
    if (activeIndex < 19) setActive(activeIndex + 1); 
  }
  
  function writeBarcode(bc) { 
    for (var i=0; i<bc.length && i<20; i++) cells[i].textContent = bc[i]; 
    setActive(0); 
  }
  
  function getBarcode() { 
    var bc = ""; 
    for (var i=0; i<20; i++) if (cells[i].textContent) bc += cells[i].textContent; else break; 
    return bc; 
  }
  
  function clearGrid() { 
    cells.forEach(c => c.textContent = ""); 
    setActive(0); 
  }

  // GOOGLE APPS SCRIPT URL
  var GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPuKraCIl5bkA5UR3xV8oK5QplHpjbe_uZfRM2B1OSb22S7gw0KaZ9qtiyedP0cEw/exec";
  
  function sendToGoogleSheets(barcode) {
    var status = statusSelect.value;
    if (!status) { 
      statusMsg.className = "status-message error";
      statusMsg.textContent = "Select status!"; 
      return; 
    }
    
    statusMsg.className = "status-message sending";
    statusMsg.textContent = "Saving to Google Sheets...";
    
    var now = new Date();
    var date = now.getFullYear() + "-" + 
               String(now.getMonth() + 1).padStart(2, '0') + "-" + 
               String(now.getDate()).padStart(2, '0');
    var time = String(now.getHours()).padStart(2, '0') + ":" + 
               String(now.getMinutes()).padStart(2, '0') + ":" + 
               String(now.getSeconds()).padStart(2, '0');
    
    // Use the real-time location data
    var locationString = locationData.address.full;
    if (locationData.coords.lat && locationData.coords.lon) {
      // If address not available, use coordinates
      if (locationString.indexOf("Acquiring") !== -1 || locationString.indexOf("location only") !== -1) {
        locationString = locationData.coords.lat.toFixed(4) + ", " + locationData.coords.lon.toFixed(4);
      }
    }
    
    var formData = new FormData();
    formData.append("label_id", barcode);
    formData.append("barcode_type", "EAN-13");
    formData.append("status", status);
    formData.append("date", date);
    formData.append("time", time);
    formData.append("location", locationString);
    formData.append("city", locationData.address.city || "");
    formData.append("state", locationData.address.state || "");
    formData.append("zip", locationData.address.zip || "");
    formData.append("eta", date);
    formData.append("timestamp", now.toISOString());

    var xhr = new XMLHttpRequest();
    xhr.open("POST", GOOGLE_SCRIPT_URL, true);
    
    xhr.onload = function() {
      try {
        var response = JSON.parse(xhr.responseText);
        if (response.success) {
          statusMsg.className = "status-message success";
          statusMsg.textContent = "SAVED TO GOOGLE SHEETS!";
          alert("SUCCESS!\nBarcode: " + barcode + "\nStatus: " + status + "\nLocation: " + locationString);
          clearGrid();
        } else {
          throw new Error(response.error || "Unknown error");
        }
      } catch(e) {
        statusMsg.className = "status-message error";
        statusMsg.textContent = "Error: " + e.message;
        alert("ERROR:\n" + e.message);
      }
    };
    
    xhr.onerror = function() {
      statusMsg.className = "status-message error";
      statusMsg.textContent = "Network error";
      alert("NETWORK ERROR");
    };
    
    xhr.send(formData);
  }

  function doEnter() { 
    var bc = getBarcode(); 
    if (bc) {
      sendToGoogleSheets(bc);
    } else {
      statusMsg.className = "status-message error";
      statusMsg.textContent = "No barcode entered";
    }
  }
  
  function doEsc() { 
    clearGrid(); 
    statusMsg.className = "status-message";
    statusMsg.textContent = "Ready"; 
  }

  // SCANNER
  var scannerModal = document.getElementById("scannerModal");
  document.getElementById("scanBtn").onclick = function() { 
    scannerModal.classList.add("active"); 
    startScanner(); 
  };
  
  function closeScanner() { 
    if (codeReader) codeReader.reset(); 
    scannerModal.classList.remove("active"); 
  }
  
  document.getElementById("closeScanner").onclick = closeScanner;
  document.getElementById("cancelScan").onclick = closeScanner;
  
  var codeReader;
  function startScanner() {
    try {
      codeReader = new ZXing.BrowserMultiFormatReader();
      codeReader.decodeFromVideoDevice(null, document.getElementById("scanner-video"), function(result) {
        if (result) {
          writeBarcode(result.text);
          closeScanner();
        }
      });
    } catch(e) { alert("Camera error: " + e.message); }
  }

  // KEYPAD - ORIGINAL BEHAVIOR
  document.querySelectorAll(".key-btn").forEach(btn => {
    btn.onclick = function() {
      var char = this.dataset.char;
      var action = this.dataset.action;
      if (char) writeChar(char);
      else if (action === "left" && activeIndex>0) setActive(activeIndex-1);
      else if (action === "right" && activeIndex<19) setActive(activeIndex+1);
      else if (action === "up" && activeIndex>=20) setActive(activeIndex-20);
      else if (action === "down" && activeIndex<180) setActive(activeIndex+20);
      else if (action === "backspace") { 
        if (cells[activeIndex].textContent) cells[activeIndex].textContent = "";
        else if (activeIndex>0) { setActive(activeIndex-1); cells[activeIndex].textContent = ""; }
      }
      else if (action === "enter") doEnter();
      else if (action === "esc") doEsc();
      else if (action === "toQwerty") {
        document.getElementById("keypadNum").style.display = "none";
        document.getElementById("keypadQwerty").style.display = "flex";
      }
      else if (action === "toNum") {
        document.getElementById("keypadNum").style.display = "flex";
        document.getElementById("keypadQwerty").style.display = "none";
      }
    };
  });

  setActive(0);
</script>
</body>
</html>
