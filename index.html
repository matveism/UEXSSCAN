<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<!-- Zoomed out for 5" display: scale 0.8, width 450px virtual but viewport scaled -->
<meta name="viewport" content="width=450, height=800, initial-scale=0.8, maximum-scale=0.8, user-scalable=no" />
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

<style>
  /* Industrial WinCE 6.0 PDA style – compact, no scrolling */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    width: 450px; 
    height: 800px; 
    overflow: hidden; 
    background: #4C7CAE;  /* Industrial blue background */
    font-family: 'Segoe UI', Tahoma, 'Arial', sans-serif; 
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .app-container {
    width: 430px;          /* Slightly smaller to fit inside body */
    height: 780px;
    display: flex;
    flex-direction: column;
    background: #1a2a3a;   /* dark industrial inner */
    border: 3px solid #2a4a6a;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 0 2px #0f1a22 inset;
  }
  
  /* Header = WinCE light grey #CAC7C9 */
  .status-bar {
    width: 100%;
    height: 34px;
    background: #CAC7C9;      /* exactly #CAC7C9 */
    color: #111111;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 16px;
    font-weight: 700;
    border-bottom: 2px solid #888;
    text-shadow: 1px 1px 0 #ddd;
  }
  
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 4px 8px 2px 8px;
    overflow: hidden;
  }
  
  /* BIG scan button – still visible */
  .scan-btn { 
    width: 100%; 
    height: 44px; 
    background: #1e4a2b; 
    color: white; 
    font-size: 20px; 
    font-weight: bold; 
    border: none; 
    border-radius: 6px; 
    margin-bottom: 4px; 
    cursor: pointer; 
    box-shadow: 0 3px 0 #0a2b13;
    letter-spacing: 1px;
    border: 1px solid #8ab36e;
  }
  .scan-btn:active { background: #166b2c; }
  
  .section-label { 
    font-weight: 600; 
    margin: 3px 0 2px 0; 
    color: #e6f0ff; 
    font-size: 14px;
    text-transform: uppercase;
  }
  
  /* GRID even more compact but readable */
  .grid { 
    width: 100%; 
    background: #253241; 
    padding: 5px 2px; 
    border-radius: 8px; 
    margin-bottom: 3px;
  }
  .row { display: flex; }
  .cell { 
    width: 16px; 
    height: 22px; 
    border: 1px solid #4a5a6a; 
    background: #2f3e4e; 
    text-align: center; 
    font-size: 13px; 
    line-height: 22px; 
    color: #ffffff; 
    font-weight: 600;
    margin: 1px;
    border-radius: 2px;
  }
  .orange { background: #c97d0b; border-color: #e5a33b; }
  .gray { background: #4a555f; border-color: #6b7a8a; }
  
  .input-row .cell { cursor: default; }
  
  .select-status-header { 
    width: 100%; 
    height: 28px; 
    background: #1e3b55; 
    color: white; 
    display: flex; 
    align-items: center; 
    padding-left: 8px; 
    margin: 4px 0 4px 0; 
    font-weight: bold; 
    border-radius: 4px;
    font-size: 14px;
  }
  
  .status-select { 
    width: 100%; 
    height: 36px; 
    font-size: 14px; 
    margin-bottom: 5px; 
    background: #2a3848; 
    color: white; 
    border: 2px solid #4a627a; 
    border-radius: 5px;
    padding: 0 6px;
    font-weight: 600;
  }
  .status-select option { background: #1e2c3a; color: white; }
  
  /* GPS status compact */
  .gps-status { 
    font-size: 12px; 
    color: #b0d0ff; 
    margin: 3px 0; 
    display: flex; 
    align-items: center; 
    gap: 5px; 
    background: #1e2e3e; 
    padding: 4px 8px; 
    border-radius: 16px;
    min-height: 34px;
  }
  .gps-dot { 
    width: 8px; 
    height: 8px; 
    border-radius: 50%; 
    background: #ffa500; 
    display: inline-block; 
  }
  .gps-dot.active { background: #2ecc71; }
  .gps-dot.error { background: #e74c3c; }
  
  .status-message { 
    text-align: center; 
    font-weight: bold; 
    padding: 4px; 
    min-height: 28px; 
    background: #1f2f3f; 
    border-radius: 16px; 
    margin: 4px 0 2px 0;
    font-size: 13px;
    line-height: 20px;
  }
  .success { color: #8bc34a; } 
  .error { color: #f28b82; } 
  .sending { color: #64b5f6; }
  
  /* KEYPAD – slightly smaller to fit */
  .keypad-wrapper { 
    margin-top: 2px; 
    background: #17222d; 
    border-radius: 10px; 
    padding: 4px 2px;
  }
  .keypad-num { display: flex; justify-content: center; }
  .col { display: flex; flex-direction: column; }
  .center-col { display: flex; flex-direction: column; margin: 0 2px; }
  .center-row { display: flex; justify-content: center; }
  .btn, .grid-btn { 
    background: #2a4055; 
    border: 2px solid #1a2b39; 
    border-radius: 5px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    color: #fff; 
    font-weight: bold; 
    cursor: pointer; 
    width: 44px; 
    height: 32px; 
    margin: 2px; 
    font-size: 14px; 
    box-shadow: 0 2px 0 #0f1a22;
  }
  .btn:active, .grid-btn:active { background: #365d7a; }
  
  .keypad-qwerty { 
    display: none; 
    flex-direction: column; 
    align-items: center; 
  }
  .q-row { display: flex; justify-content: center; }
  .q-btn { 
    width: 26px; 
    height: 32px; 
    margin: 1px; 
    background: #2a4055; 
    border: 2px solid #1a2b39; 
    border-radius: 5px; 
    color: #fff; 
    font-weight: bold; 
    cursor: pointer; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 12px; 
  }
  .q-btn.wide { width: 42px; }
  .q-btn.space { width: 82px; }
  
  /* SCANNER MODAL */
  .scanner-modal { 
    display: none; 
    position: fixed; 
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 430px; 
    height: 780px; 
    background: #000; 
    z-index: 9999; 
    flex-direction: column; 
    border: 4px solid #7a8a9a;
    border-radius: 10px;
  }
  .scanner-modal.active { display: flex; }
  .scanner-header { 
    width: 100%; 
    height: 40px; 
    background: #CAC7C9; 
    color: #111; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    padding: 0 12px; 
    font-weight: 700;
  }
  .scanner-close { 
    width: 30px; 
    height: 30px; 
    background: #2a4055; 
    border-radius: 4px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-size: 20px; 
    cursor: pointer; 
    color: white;
  }
  .scanner-content { flex: 1; background: #000; position: relative; }
  #scanner-video { width: 100%; height: 100%; object-fit: cover; }
  .scanner-frame { 
    position: absolute; 
    top: 50%; left: 50%; transform: translate(-50%, -50%); 
    width: 280px; height: 120px; 
    border: 2px solid #1e4a2b; 
    box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); 
  }
  .scanner-footer { 
    width: 100%; height: 50px; 
    background: #CAC7C9; 
    display: flex; align-items: center; justify-content: center; 
  }
  .scanner-cancel { 
    background: #7a2e2e; border: 2px solid #521f1f; border-radius: 6px; color: #fff; font-weight: bold; font-size: 16px; padding: 8px 30px; cursor: pointer; 
  }
  
  .footer-time {
    text-align: right;
    font-size: 12px;
    color: #b0c9f0;
    padding: 2px 6px 0 0;
  }
</style>
</head>
<body>
<div class="app-container">

      </div>
      <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
      <div class="row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell gray"></div><div class="cell gray"></div><div class="cell gray"></div><div class="cell gray"></div><div class="cell gray"></div><div class="cell gray"></div><div class="cell gray"></div><div class="cell gray"></div><div class="cell gray"></div><div class="cell gray"></div><div class="cell gray"></div></div>

        <div class="q-row"><div class="q-btn key-btn" data-char="A">A</div><div class="q-btn key-btn" data-char="S">S</div><div class="q-btn key-btn" data-char="D">D</div><div class="q-btn key-btn" data-char="F">F</div><div class="q-btn key-btn" data-char="G">G</div><div class="q-btn key-btn" data-char="H">H</div><div class="q-btn key-btn" data-char="J">J</div><div class="q-btn key-btn" data-char="K">K</div><div class="q-btn key-btn" data-char="L">L</div></div>

  <div class="scanner-modal" id="scannerModal">

    <div class="scanner-content"><video id="scanner-video"></video><div class="scanner-frame"></div></div>
    <div class="scanner-footer"><div class="scanner-cancel" id="cancelScan">CANCEL</div></div>

<script>
  // ========== BEEP SOUND (simple Web Audio API, works on most) ==========
  function playBeep() {
    try {
      var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      var oscillator = audioCtx.createOscillator();
      var gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // high pitch
      gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + 0.15); // short beep
    } catch(e) { console.log("Beep failed", e); }
  }

  // TIME UPDATE
  function updateTime() {
    var el = document.getElementById("timeDisplay");
    var now = new Date();
    var hours = now.getHours();
    var ampm = hours >= 12 ? "PM" : "AM";
    hours = hours % 12 || 12;
    var minutes = now.getMinutes() < 10 ? "0" + now.getMinutes() : now.getMinutes();
    el.textContent = hours + ":" + minutes + " " + ampm;
    document.getElementById("footerTime").textContent = now.toLocaleDateString();
  }
  setInterval(updateTime, 1000);
  updateTime();

  // ========== ROBUST GPS (same as original, shortened) ==========
  var gpsDot = document.getElementById("gpsDot");
  var gpsText = document.getElementById("gpsText");
  
  var locationData = {
    coords: { lat: null, lon: null, accuracy: null },
    address: { city: "", state: "", zip: "", full: "Acquiring GPS..." },
  };

  var lastKnownCoords = null;
  var watchId = null;

  function fetchAddressFromCoords(lat, lon, callback) {
    var bdcUrl = "https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=" + lat + "&longitude=" + lon + "&localityLanguage=en";
    var xhr = new XMLHttpRequest();
    xhr.open("GET", bdcUrl, true);
    xhr.timeout = 5000;
    xhr.onload = function() {
      if (xhr.status === 200) {
        try {
          var data = JSON.parse(xhr.responseText);
          var city = data.city || data.locality || "";
          var state = data.principalSubdivision || "";
          var zip = data.postcode || "";
          var full = [city, state, zip].filter(Boolean).join(", ");
          callback({ city, state, zip, full: full || lat.toFixed(4)+", "+lon.toFixed(4) });
        } catch(e) { callback({ city:"", state:"", zip:"", full: lat.toFixed(4)+", "+lon.toFixed(4) }); }
      } else { callback({ city:"", state:"", zip:"", full: lat.toFixed(4)+", "+lon.toFixed(4) }); }
    };
    xhr.onerror = () => callback({ city:"", state:"", zip:"", full: lat.toFixed(4)+", "+lon.toFixed(4) });
    xhr.send();
  }

  function updateGpsDisplay() {
    if (locationData.coords.lat !== null) {
      gpsDot.className = "gps-dot active";
      var coordStr = locationData.coords.lat.toFixed(4)+", "+locationData.coords.lon.toFixed(4);
      var text = locationData.address.full && !locationData.address.full.includes("Acquiring") ? locationData.address.full : coordStr;
      if (locationData.coords.accuracy) text += " ±"+Math.round(locationData.coords.accuracy)+"m";
      gpsText.textContent = text;
    } else {
      gpsDot.className = "gps-dot error";
      gpsText.textContent = "GPS unavailable";
    }
  }

  function onLocationSuccess(position) {
    var lat = position.coords.latitude;
    var lon = position.coords.longitude;
    var accuracy = position.coords.accuracy;
    locationData.coords = { lat, lon, accuracy };
    
    var dist = 1000;
    if (lastKnownCoords) {
      var R = 6371e3;
      var φ1 = lastKnownCoords.lat * Math.PI/180;
      var φ2 = lat * Math.PI/180;
      var Δφ = (lat - lastKnownCoords.lat) * Math.PI/180;
      var Δλ = (lon - lastKnownCoords.lon) * Math.PI/180;
      var a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
      var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      dist = R * c;
    }
    lastKnownCoords = { lat, lon };
    
    updateGpsDisplay();
    if (dist > 50 || !locationData.address.full || locationData.address.full.includes("Acquiring")) {
      fetchAddressFromCoords(lat, lon, (addr) => {
        locationData.address = addr;
        updateGpsDisplay();
      });
    }
  }
  function onLocationError(err) { 
    gpsDot.className = "gps-dot error"; 
    gpsText.textContent = "GPS error"; 
  }
  function startRealTimeLocation() {
    if (navigator.geolocation) {
      if (watchId) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(onLocationSuccess, onLocationError, { enableHighAccuracy: true, timeout: 15000 });
    } else { gpsText.textContent = "No geolocation"; }
  }
  startRealTimeLocation();
  document.addEventListener("visibilitychange", () => { if (!document.hidden) startRealTimeLocation(); });

  // GRID logic
  var cells = Array.from(document.querySelectorAll(".input-cell"));
  var activeIndex = 0;
  var statusMsg = document.getElementById("statusMessage");
  var statusSelect = document.getElementById("statusSelect");

  function setActive(i) { cells.forEach(c => c.classList.remove("orange")); cells[i].classList.add("orange"); activeIndex = i; }
  function writeChar(ch) { if (activeIndex < cells.length) { cells[activeIndex].textContent = ch; if (activeIndex < 19) setActive(activeIndex+1); } }
  function writeBarcode(bc) { for (let i=0; i<bc.length && i<20; i++) cells[i].textContent = bc[i]; setActive(0); playBeep(); } // BEEP added here!
  function getBarcode() { var s=""; for(let i=0;i<20;i++) if(cells[i].textContent) s+=cells[i].textContent; else break; return s; }
  function clearGrid() { cells.forEach(c=>c.textContent=""); setActive(0); }

  var GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyPuKraCIl5bkA5UR3xV8oK5QplHpjbe_uZfRM2B1OSb22S7gw0KaZ9qtiyedP0cEw/exec";
  
  function sendToGoogleSheets(barcode) {
    var status = statusSelect.value;
    if (!status) { statusMsg.className = "status-message error"; statusMsg.textContent = "Select status!"; return; }
    statusMsg.className = "status-message sending"; statusMsg.textContent = "Saving...";
    var now = new Date();
    var date = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,'0')+"-"+String(now.getDate()).padStart(2,'0');
    var time = String(now.getHours()).padStart(2,'0')+":"+String(now.getMinutes()).padStart(2,'0')+":"+String(now.getSeconds()).padStart(2,'0');
    var locationString = locationData.address.full;
    if (!locationString || locationString.includes("Acquiring")) {
      if (locationData.coords.lat) locationString = locationData.coords.lat.toFixed(4)+", "+locationData.coords.lon.toFixed(4);
    }
    var formData = new FormData();
    formData.append("label_id", barcode);
    formData.append("barcode_type", "EAN-13");
    formData.append("status", status);
    formData.append("date", date);
    formData.append("time", time);
    formData.append("location", locationString);
    formData.append("city", locationData.address.city || "");
    formData.append("state", locationData.address.state || "");
    formData.append("zip", locationData.address.zip || "");
    formData.append("eta", date);
    formData.append("timestamp", now.toISOString());

    var xhr = new XMLHttpRequest();
    xhr.open("POST", GOOGLE_SCRIPT_URL, true);
    xhr.onload = function() {
      try {
        var resp = JSON.parse(xhr.responseText);
        if (resp.success) {
          statusMsg.className = "status-message success"; statusMsg.textContent = "SAVED!";
          alert("SAVED\nBarcode: "+barcode+"\nStatus: "+status);
          clearGrid(); playBeep(); // BEEP after save too
        } else throw new Error(resp.error);
      } catch(e) { statusMsg.className = "status-message error"; statusMsg.textContent = "Error: "+e.message; }
    };
    xhr.onerror = function() { statusMsg.className = "status-message error"; statusMsg.textContent = "Network error"; };
    xhr.send(formData);
  }

  function doEnter() { var bc = getBarcode(); if(bc) sendToGoogleSheets(bc); else { statusMsg.className="error"; statusMsg.textContent="Empty barcode"; } }
  function doEsc() { clearGrid(); statusMsg.textContent="Ready"; }

  // Scanner with beep integrated
  var scannerModal = document.getElementById("scannerModal");
  document.getElementById("scanBtn").onclick = function() { scannerModal.classList.add("active"); startScanner(); };
  function closeScanner() { if (codeReader) codeReader.reset(); scannerModal.classList.remove("active"); }
  document.getElementById("closeScanner").onclick = closeScanner;
  document.getElementById("cancelScan").onclick = closeScanner;
  
  var codeReader;
  function startScanner() {
    try {
      codeReader = new ZXing.BrowserMultiFormatReader();
      codeReader.decodeFromVideoDevice(null, document.getElementById("scanner-video"), (result) => {
        if (result) {
          writeBarcode(result.text);  // BEEP inside writeBarcode
          closeScanner();
        }
      });
    } catch(e) { alert("Camera error"); }
  }

  // Keypad events
  document.querySelectorAll(".key-btn").forEach(btn => {
    btn.onclick = function() {
      var char = this.dataset.char;
      var action = this.dataset.action;
      if (char) writeChar(char);
      else if (action === "left" && activeIndex>0) setActive(activeIndex-1);
      else if (action === "right" && activeIndex<19) setActive(activeIndex+1);
      else if (action === "up" && activeIndex>=20) setActive(activeIndex-20);
      else if (action === "down" && activeIndex<180) setActive(activeIndex+20);
      else if (action === "backspace") { 
        if (cells[activeIndex].textContent) cells[activeIndex].textContent = "";
        else if (activeIndex>0) { setActive(activeIndex-1); cells[activeIndex].textContent = ""; }
      }
      else if (action === "enter") doEnter();
      else if (action === "esc") doEsc();
      else if (action === "toQwerty") { document.getElementById("keypadNum").style.display = "none"; document.getElementById("keypadQwerty").style.display = "flex"; }
      else if (action === "toNum") { document.getElementById("keypadNum").style.display = "flex"; document.getElementById("keypadQwerty").style.display = "none"; }
    };
  });

  setActive(0);
</script>
</body>
</html>
